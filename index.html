<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IMPERION - Earn Money Daily</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0F2C;
            color: #EFF3FC;
            min-height: 100vh;
        }

        /* Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1C2541;
            display: flex;
            justify-content: space-around;
            padding: 12px 16px;
            border-top: 1px solid #00E5FF;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #8D99AE;
            text-decoration: none;
            font-size: 12px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .nav-item.active {
            color: #00E5FF;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #00E5FF, #B026FF);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-secondary {
            background: #1C2541;
            border: 1px solid #00E5FF;
            padding: 10px 20px;
            border-radius: 40px;
            color: #00E5FF;
            cursor: pointer;
        }

        /* Cards */
        .card {
            background: #1C2541;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        /* I Coin */
        .icoin {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transition: transform 0.1s;
            margin: 0 auto;
        }

        .icoin:active {
            transform: scale(0.95);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a3450;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #00F5D4;
            border-radius: 10px;
            transition: width 0.3s;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #00E5FF;
            background: #1C2541;
            color: white;
            font-size: 16px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        h1, h2, h3 {
            color: #B026FF;
            margin-bottom: 16px;
        }

        .text-center {
            text-align: center;
        }

        .flex {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- App will render here -->
    </div>

    <script>
        // Simple router
        function navigateTo(page) {
            window.location.hash = page;
            renderPage();
        }

        // Get current page from hash
        function getCurrentPage() {
            const hash = window.location.hash.slice(1) || '/';
            return hash;
        }

        // Navigation component
        function BottomNav() {
            const currentPage = getCurrentPage();
            return `
                <div class="bottom-nav">
                    <button class="nav-item ${currentPage === '/' ? 'active' : ''}" onclick="navigateTo('/')">🏠 Home</button>
                    <button class="nav-item ${currentPage === '/dashboard' ? 'active' : ''}" onclick="navigateTo('/dashboard')">📊 Dashboard</button>
                    <button class="nav-item ${currentPage === '/tasks' ? 'active' : ''}" onclick="navigateTo('/tasks')">📋 Tasks</button>
                    <button class="nav-item ${currentPage === '/profile' ? 'active' : ''}" onclick="navigateTo('/profile')">👤 Profile</button>
                </div>
            `;
        }

        // Landing Page
        function LandingPage() {
            return `
                <div class="container">
                    <h1 class="text-center">💰 IMPERION</h1>
                    <p class="text-center" style="margin-bottom: 20px;">Earn money by simply creating TikTok videos, completing tasks, and tapping the I Coin!</p>
                    
                    <div class="text-center">
                        <button class="btn-primary" onclick="navigateTo('/signup')">Get Started</button>
                    </div>

                    <div class="flex" style="justify-content: center; margin: 30px 0;">
                        <div class="card" style="text-align: center; width: 100px;">🎵 TikTok</div>
                        <div class="card" style="text-align: center; width: 100px;">💬 WhatsApp</div>
                        <div class="card" style="text-align: center; width: 100px;">📸 Instagram</div>
                    </div>

                    <h2 class="text-center">What does it take to join Imperion?</h2>
                    <div class="grid-2">
                        <div class="card text-center">
                            <h3>Basic</h3>
                            <p style="font-size: 24px; color: #FFD700;">₦1,000</p>
                            <p>5 Months Access</p>
                            <p>40% earning rate</p>
                        </div>
                        <div class="card text-center" style="border: 2px solid #00E5FF;">
                            <h3>Premium</h3>
                            <p style="font-size: 24px; color: #FFD700;">₦2,500</p>
                            <p>Lifetime Access</p>
                            <p>100% earning rate</p>
                        </div>
                    </div>

                    <h2 class="text-center">Features</h2>
                    <div class="grid-2">
                        <div class="card text-center">🎯 Daily Tasks</div>
                        <div class="card text-center">🪙 Fix Tap Game</div>
                        <div class="card text-center">🎁 Daily Bonus</div>
                        <div class="card text-center">👥 Referrals</div>
                        <div class="card text-center">📱 Airtime/Data</div>
                        <div class="card text-center">💳 Withdrawals</div>
                    </div>

                    <div class="text-center" style="margin-top: 20px;">
                        <a href="https://chat.whatsapp.com/DkUVaf1ZIus1rxummUzXYW" style="color: #00E5FF;">Join WhatsApp Group</a>
                    </div>
                </div>
                ${BottomNav()}
            `;
        }

        // Signup Page
        function SignupPage() {
            return `
                <div class="container">
                    <h2>Create Account</h2>
                    <form id="signupForm">
                        <input type="text" id="username" placeholder="Username" required>
                        <input type="email" id="email" placeholder="Email" required>
                        <input type="tel" id="phone" placeholder="Phone Number" required>
                        <input type="password" id="password" placeholder="Password (min 6 chars)" required>
                        <input type="text" id="referralCode" placeholder="Referral Code (Optional)">
                        <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
                    </form>
                    <p class="text-center" style="margin-top: 20px;">
                        Already have an account? <a href="#" onclick="navigateTo('/login'); return false;" style="color: #00E5FF;">Login</a>
                    </p>
                    <div class="text-center" style="margin-top: 20px;">
                        <a href="#" style="color: #FFD700;" onclick="navigateTo('/admin'); return false;">A</a>
                    </div>
                </div>
                ${BottomNav()}
            `;
        }

        // Login Page
        function LoginPage() {
            return `
                <div class="container">
                    <h2>Login</h2>
                    <form id="loginForm">
                        <input type="email" id="email" placeholder="Email" required>
                        <input type="password" id="password" placeholder="Password" required>
                        <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
                    </form>
                    <p class="text-center" style="margin-top: 20px;">
                        Don't have an account? <a href="#" onclick="navigateTo('/signup'); return false;" style="color: #00E5FF;">Sign up</a>
                    </p>
                </div>
                ${BottomNav()}
            `;
        }

        // Dashboard Page with Fix Tap Game
        function DashboardPage() {
            let tapsToday = localStorage.getItem('tapsToday') ? parseInt(localStorage.getItem('tapsToday')) : 0;
            let icoins = localStorage.getItem('icoins') ? parseInt(localStorage.getItem('icoins')) : 0;
            let lastTapDate = localStorage.getItem('lastTapDate');
            
            // Reset if new day
            const today = new Date().toDateString();
            if (lastTapDate !== today) {
                tapsToday = 0;
                localStorage.setItem('tapsToday', tapsToday);
                localStorage.setItem('lastTapDate', today);
            }

            return `
                <div class="container">
                    <h2>Welcome, User!</h2>
                    <p>Plan: <span style="color: #00E5FF;">None</span></p>

                    <div class="text-center" style="margin: 30px 0;">
                        <div class="icoin" onclick="handleTap()">🪙 I Coin</div>
                        <p style="margin-top: 16px;">Taps Today: ${tapsToday}/200</p>
                        <p>I Coins: ${icoins}</p>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${(tapsToday / 200) * 100}%"></div>
                        </div>
                    </div>

                    <div class="grid-2">
                        <button class="btn-secondary" onclick="navigateTo('/tasks')">📋 Tasks</button>
                        <button class="btn-secondary" onclick="navigateTo('/withdraw')">💰 Withdraw</button>
                        <button class="btn-secondary" onclick="navigateTo('/deposit')">💳 Deposit</button>
                        <button class="btn-secondary" onclick="navigateTo('/referrals')">👥 Referrals</button>
                    </div>
                </div>
                ${BottomNav()}
            `;
        }

        // Tasks Page
        function TasksPage() {
            return `
                <div class="container">
                    <h2>Available Tasks</h2>
                    <div class="card">
                        <h3>TikTok Video</h3>
                        <p>Price: ₦500</p>
                        <p>You will earn: ₦500</p>
                        <button class="btn-primary" style="width: 100%; margin-top: 10px;" onclick="alert('Task submission feature coming soon!')">Submit Proof</button>
                    </div>
                    <div class="card">
                        <h3>WhatsApp Post</h3>
                        <p>Price: ₦300</p>
                        <p>You will earn: ₦300</p>
                        <button class="btn-primary" style="width: 100%; margin-top: 10px;" onclick="alert('Task submission feature coming soon!')">Submit Proof</button>
                    </div>
                </div>
                ${BottomNav()}
            `;
        }

        // Withdraw Page
        function WithdrawPage() {
            return `
                <div class="container">
                    <h2>Withdraw Funds</h2>
                    <div class="card">
                        <p>Task Balance: ₦0</p>
                        <p>Referral Balance: ₦0</p>
                        <p>Daily Balance: ₦0</p>
                        <p>I Coins: 0</p>
                    </div>
                    <form id="withdrawForm">
                        <select id="balanceType">
                            <option value="task">Task Balance (Min ₦2500)</option>
                            <option value="referral">Referral Balance (Min ₦1500)</option>
                            <option value="daily">Daily Balance (Min ₦3000)</option>
                        </select>
                        <input type="number" id="amount" placeholder="Amount" required>
                        <input type="text" id="bankName" placeholder="Bank Name" required>
                        <input type="text" id="accountNumber" placeholder="Account Number" required>
                        <input type="text" id="accountName" placeholder="Account Holder Name" required>
                        <button type="submit" class="btn-primary" style="width: 100%;">Submit Withdrawal</button>
                    </form>
                </div>
                ${BottomNav()}
            `;
        }

        // Deposit Page
        function DepositPage() {
            return `
                <div class="container">
                    <h2>Deposit to Activate Plan</h2>
                    <div class="card">
                        <h3>Bank Account Details</h3>
                        <p><strong>Account Name:</strong> Favour Ifedayo Sam Ayinde</p>
                        <p><strong>Account Number:</strong> 7084318814</p>
                        <p><strong>Bank:</strong> Opay</p>
                        <button class="btn-secondary" onclick="copyToClipboard('7084318814')">Copy Number</button>
                    </div>
                    <form id="depositForm">
                        <select id="planType">
                            <option value="basic">Basic Plan - ₦1,000 (5 months, 40% earnings)</option>
                            <option value="premium">Premium Plan - ₦2,500 (Lifetime, 100% earnings)</option>
                        </select>
                        <input type="text" id="receiptUrl" placeholder="Receipt Image URL">
                        <button type="submit" class="btn-primary" style="width: 100%;">Submit Deposit</button>
                    </form>
                </div>
                ${BottomNav()}
            `;
        }

        // Referrals Page
        function ReferralsPage() {
            const referralLink = `${window.location.origin}${window.location.pathname}#/signup?ref=USER123`;
            return `
                <div class="container">
                    <h2>Referrals</h2>
                    <div class="card">
                        <p><strong>Your Referral Link:</strong></p>
                        <input type="text" value="${referralLink}" readonly id="referralLink">
                        <button class="btn-secondary" onclick="copyToClipboard(document.getElementById('referralLink').value)">Copy Link</button>
                    </div>
                    <div class="card">
                        <p><strong>Total Referrals:</strong> 0</p>
                        <p><strong>Total Commissions:</strong> ₦0</p>
                    </div>
                </div>
                ${BottomNav()}
            `;
        }

        // Profile Page
        function ProfilePage() {
            return `
                <div class="container">
                    <h2>My Profile</h2>
                    <div class="card">
                        <p><strong>Username:</strong> User</p>
                        <p><strong>Email:</strong> user@example.com</p>
                        <p><strong>Plan:</strong> None</p>
                        <p><strong>Multiplier:</strong> 0x</p>
                    </div>
                    <div class="card">
                        <h3>Balances</h3>
                        <p>Task Balance: ₦0</p>
                        <p>Referral Balance: ₦0</p>
                        <p>Daily Balance: ₦0</p>
                        <p>I Coins: 0</p>
                    </div>
                </div>
                ${BottomNav()}
            `;
        }

        // History Page
        function HistoryPage() {
            return `
                <div class="container">
                    <h2>Transaction History</h2>
                    <div class="card">
                        <p>No transactions yet.</p>
                    </div>
                </div>
                ${BottomNav()}
            `;
        }

        // Daily Bonus Page
        function DailyBonusPage() {
            return `
                <div class="container text-center">
                    <h2>Daily Bonus</h2>
                    <div class="card">
                        <p style="font-size: 48px;">🎁</p>
                        <h3>Claim Your Daily Bonus</h3>
                        <p>Amount: <strong style="color: #FFD700; font-size: 24px;">₦0</strong></p>
                        <button class="btn-primary" onclick="alert('Please activate a plan first!')">Claim Bonus</button>
                    </div>
                </div>
                ${BottomNav()}
            `;
        }

        // Admin Page
        function AdminPage() {
            const passcode = prompt('Enter admin passcode:');
            if (passcode !== '2006') {
                alert('Invalid passcode');
                navigateTo('/');
                return;
            }
            return `
                <div class="container">
                    <h2>Admin Panel</h2>
                    <div class="card">
                        <h3>Withdrawal Requests</h3>
                        <p>No pending withdrawals.</p>
                    </div>
                    <div class="card">
                        <h3>Deposit Requests</h3>
                        <p>No pending deposits.</p>
                    </div>
                    <button class="btn-primary" onclick="navigateTo('/')">Back to Site</button>
                </div>
                ${BottomNav()}
            `;
        }

        // Global functions
        window.handleTap = function() {
            let tapsToday = localStorage.getItem('tapsToday') ? parseInt(localStorage.getItem('tapsToday')) : 0;
            let icoins = localStorage.getItem('icoins') ? parseInt(localStorage.getItem('icoins')) : 0;
            let lastTapDate = localStorage.getItem('lastTapDate');
            
            const today = new Date().toDateString();
            if (lastTapDate !== today) {
                tapsToday = 0;
                localStorage.setItem('tapsToday', tapsToday);
                localStorage.setItem('lastTapDate', today);
            }
            
            if (tapsToday >= 200) {
                alert('You have reached your daily tap limit (200 taps)!');
                return;
            }
            
            tapsToday++;
            icoins += 10;
            localStorage.setItem('tapsToday', tapsToday);
            localStorage.setItem('icoins', icoins);
            
            renderPage();
        };

        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text);
            alert('Copied to clipboard!');
        };

        // Handle form submissions
        document.addEventListener('submit', function(e) {
            if (e.target.id === 'signupForm') {
                e.preventDefault();
                alert('✅ Account created successfully! Redirecting to login...');
                setTimeout(() => navigateTo('/login'), 2000);
            }
            if (e.target.id === 'loginForm') {
                e.preventDefault();
                alert('Login successful! Redirecting to dashboard...');
                setTimeout(() => navigateTo('/dashboard'), 1000);
            }
            if (e.target.id === 'withdrawForm') {
                e.preventDefault();
                alert('Withdrawal request submitted!');
            }
            if (e.target.id === 'depositForm') {
                e.preventDefault();
                alert('Deposit request submitted!');
            }
        });

        // Router
        function renderPage() {
            const page = getCurrentPage();
            const appDiv = document.getElementById('app');
            
            switch(page) {
                case '/':
                    appDiv.innerHTML = LandingPage();
                    break;
                case '/signup':
                    appDiv.innerHTML = SignupPage();
                    break;
                case '/login':
                    appDiv.innerHTML = LoginPage();
                    break;
                case '/dashboard':
                    appDiv.innerHTML = DashboardPage();
                    break;
                case '/tasks':
                    appDiv.innerHTML = TasksPage();
                    break;
                case '/withdraw':
                    appDiv.innerHTML = WithdrawPage();
                    break;
                case '/deposit':
                    appDiv.innerHTML = DepositPage();
                    break;
                case '/referrals':
                    appDiv.innerHTML = ReferralsPage();
                    break;
                case '/profile':
                    appDiv.innerHTML = ProfilePage();
                    break;
                case '/history':
                    appDiv.innerHTML = HistoryPage();
                    break;
                case '/daily-bonus':
                    appDiv.innerHTML = DailyBonusPage();
                    break;
                case '/admin':
                    appDiv.innerHTML = AdminPage();
                    break;
                default:
                    appDiv.innerHTML = LandingPage();
            }
        }

        // Initialize
        window.addEventListener('hashchange', renderPage);
        renderPage();
    </script>
</body>
</html>
