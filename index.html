<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IMPERION - Earn Money Daily</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0F2C;
            color: #EFF3FC;
            min-height: 100vh;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1C2541;
            display: flex;
            justify-content: space-around;
            padding: 12px 16px;
            border-top: 1px solid #00E5FF;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #8D99AE;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }

        .nav-item.active {
            color: #00E5FF;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #00E5FF, #B026FF);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #1C2541;
            border: 1px solid #00E5FF;
            padding: 10px 20px;
            border-radius: 40px;
            color: #00E5FF;
            cursor: pointer;
            font-weight: bold;
        }

        /* Cards */
        .card {
            background: #1C2541;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: #00E5FF;
            box-shadow: 0 8px 20px rgba(0, 229, 255, 0.2);
        }

        /* I Coin */
        .icoin {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transition: transform 0.1s;
            margin: 0 auto;
        }

        .icoin:active {
            transform: scale(0.95);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a3450;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: #00F5D4;
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* Forms */
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #00E5FF;
            background: #1C2541;
            color: white;
            font-size: 16px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #B026FF;
        }

        /* Layout */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #FFFFFF, #00E5FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        h2, h3 {
            color: #B026FF;
            margin-bottom: 16px;
        }

        .text-center {
            text-align: center;
        }

        .flex {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        a {
            color: #00E5FF;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Balance Cards */
        .balance-card {
            background: linear-gradient(135deg, #1C2541, #16202e);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid #00E5FF;
        }

        .balance-amount {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            margin: 8px 0;
        }

        /* Feature Icons */
        .feature-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(0,229,255,0.1), rgba(176,38,255,0.1));
            border-radius: 30px;
            margin-bottom: 30px;
        }

        /* Pricing Cards */
        .pricing-card {
            text-align: center;
            padding: 20px;
        }

        .price {
            font-size: 28px;
            color: #FFD700;
            font-weight: bold;
            margin: 10px 0;
        }

        .popular {
            border: 2px solid #00E5FF;
            position: relative;
        }

        .popular-badge {
            position: absolute;
            top: -12px;
            right: 20px;
            background: #00E5FF;
            color: #0A0F2C;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>

                        </select>
                        <select>
                            <option>Airtime (₦200)</option>
                            <option>Data (₦200)</option>
                        </select>
                        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 16px;">Purchase</button>
                    </form>
                </div>
                ${BottomNav()}
            `;
        }
        
        // ============ ADMIN PANEL ============
        function AdminPage() {
            let pass = prompt('Enter admin passcode:');
            if (pass !== '2006') { 
                alert('Invalid passcode'); 
                navigateTo('/'); 
                return ''; 
            }
            return `
                <div class="container">
                    <h2>🔧 Admin Panel</h2>
                    <div class="card">
                        <h3>Withdrawal Requests</h3>
                        <p style="color: #8D99AE;">No pending withdrawals</p>
                    </div>
                    <div class="card">
                        <h3>Deposit Requests</h3>
                        <p style="color: #8D99AE;">No pending deposits</p>
                    </div>
                    <div class="card">
                        <h3>Task Submissions</h3>
                        <p style="color: #8D99AE;">No pending submissions</p>
                    </div>
                    <button class="btn-primary" style="width: 100%;" onclick="navigateTo('/')">Back to Site</button>
                </div>
                ${BottomNav()}
            `;
        }
        
        // ============ GLOBAL FUNCTIONS ============
        window.handleTap = function() {
            let taps = localStorage.getItem('taps') ? parseInt(localStorage.getItem('taps')) : 0;
            let coins = localStorage.getItem('coins') ? parseInt(localStorage.getItem('coins')) : 0;
            let lastDate = localStorage.getItem('lastDate');
            let today = new Date().toDateString();
            
            if (lastDate !== today) { 
                taps = 0; 
            }
            
            if (taps >= 200) { 
                alert('❌ You have reached your daily tap limit (200 taps)!'); 
                return; 
            }
            
            taps++;
            coins += 10;
            
            localStorage.setItem('taps', taps);
            localStorage.setItem('coins', coins);
            localStorage.setItem('lastDate', today);
            
            renderPage();
        };
        
        window.copyToClipboard = function(text) { 
            navigator.clipboard.writeText(text); 
            alert('✅ Copied to clipboard!'); 
        };
        
        window.copyLink = function() { 
            let link = document.getElementById('refLink');
            if(link) { 
                navigator.clipboard.writeText(link.value); 
                alert('✅ Referral link copied!'); 
            }
        };
        
        // ============ FORM HANDLERS ============
        document.addEventListener('submit', function(e) {
            if (e.target.id === 'signupForm') { 
                e.preventDefault(); 
                alert('✅ Account created successfully! Redirecting to login...'); 
                setTimeout(() => navigateTo('/login'), 2000); 
            }
            if (e.target.id === 'loginForm') { 
                e.preventDefault(); 
                alert('✅ Login successful! Redirecting to dashboard...'); 
                setTimeout(() => navigateTo('/dashboard'), 1000); 
            }
            if (e.target.id === 'withdrawForm') { 
                e.preventDefault(); 
                alert('✅ Withdrawal request submitted!'); 
            }
            if (e.target.id === 'depositForm') { 
                e.preventDefault(); 
                alert('✅ Deposit request submitted!'); 
            }
            if (e.target.id === 'airtimeForm') { 
                e.preventDefault(); 
                alert('✅ Purchase request submitted!'); 
            }
        });
        
        // ============ ROUTER ============
        function renderPage() {
            let page = getCurrentPage();
            let app = document.getElementById('app');
            
            switch(page) {
                case '/': app.innerHTML = LandingPage(); break;
                case '/signup': app.innerHTML = SignupPage(); break;
                case '/login': app.innerHTML = LoginPage(); break;
                case '/dashboard': app.innerHTML = DashboardPage(); break;
                case '/tasks': app.innerHTML = TasksPage(); break;
                case '/withdraw': app.innerHTML = WithdrawPage(); break;
                case '/deposit': app.innerHTML = DepositPage(); break;
                case '/referrals': app.innerHTML = ReferralsPage(); break;
                case '/profile': app.innerHTML = ProfilePage(); break;
                case '/history': app.innerHTML = HistoryPage(); break;
                case '/daily-bonus': app.innerHTML = DailyBonusPage(); break;
                case '/data-airtime': app.innerHTML = DataAirtimePage(); break;
                case '/admin': app.innerHTML = AdminPage(); break;
                default: app.innerHTML = LandingPage();
            }
        }
        
        window.addEventListener('hashchange', renderPage);
        renderPage();
    </script>
</body>
</html>
